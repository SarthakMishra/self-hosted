# HTTPRoute for Argo Workflows — Local Development
# Routes traffic to the Argo Workflows server via the Traefik Gateway.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argo-workflows
  namespace: argo-workflows
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
  hostnames:
    - workflows.k8s.local
  rules:
    - backendRefs:
        - name: argo-workflows-server
          port: 2746
