# Argo CD Application for infrastructure — Local Development
# Syncs namespaces and HTTPRoutes from the local Kustomize overlay.
# Helm releases are managed separately (not via this Application).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infrastructure
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/SarthakMishra/self-hosted.git
    targetRevision: kubernetes
    path: kubernetes/infrastructure/overlays/local

  destination:
    server: https://kubernetes.default.svc

  # Ignore fields that Kubernetes auto-populates on resources.
  # Without these, Argo CD sees perpetual OutOfSync diffs between
  # the minimal manifests in Git and the server-defaulted live state.
  ignoreDifferences:
    - group: ""
      kind: Namespace
      jsonPointers:
        - /metadata/labels/kubernetes.io~1metadata.name
        - /spec/finalizers
        - /status
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      jsonPointers:
        - /status

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
