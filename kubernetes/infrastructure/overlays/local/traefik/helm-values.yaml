# Traefik Helm chart — Local Development overrides
#
# Install with both base and overlay values:
#   helm install traefik traefik/traefik -n traefik \
#     -f infrastructure/base/traefik/helm-values.yaml \
#     -f infrastructure/overlays/local/traefik/helm-values.yaml

# Use NodePort for local dev (no MetalLB needed)
service:
  type: NodePort

ports:
  web:
    nodePort: 30080
  # Disable HTTPS for local development
  websecure:
    expose:
      default: false
