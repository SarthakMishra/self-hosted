# Argo Rollouts Helm chart — shared defaults
# Chart: https://argoproj.github.io/argo-helm (argo-rollouts)
#
# Install with base + overlay values:
#   helm install argo-rollouts argo/argo-rollouts -n argo-rollouts \
#     -f infrastructure/base/argo-rollouts/helm-values.yaml \
#     -f infrastructure/overlays/{env}/argo-rollouts/helm-values.yaml

# Enable the Argo Rollouts dashboard
dashboard:
  enabled: true

# Install the Gateway API traffic router plugin
# This allows Rollouts to manage HTTPRoute weights during canary deployments
# Ref: https://argo-rollouts.readthedocs.io/en/stable/features/traffic-management/plugins/
controller:
  trafficRouterPlugins:
    - name: "argoproj-labs/gatewayAPI"
      location: "https://github.com/argoproj-labs/rollouts-plugin-trafficrouter-gatewayapi/releases/download/v0.11.0/gatewayapi-plugin-linux-amd64"
