# Harbor UI and Docker API
# Docker push/pull: docker login harbor.k8s.home.example.com
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: harbor
  namespace: harbor
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
  hostnames:
    - harbor.k8s.home.example.com
  rules:
    # Harbor core (UI + API)
    - backendRefs:
        - name: harbor-core
          port: 80
