# CI/CD RBAC — Local Development
#
# This creates:
#   1. A workflow executor ServiceAccount (argo-workflow) that the Helm
#      chart's RoleBinding expects — workflows run as this SA so they
#      can report task results back to the controller.
#   2. A dedicated ServiceAccount for the Sensor (sensor-workflow-submit)
#   3. A Role in argo-workflows granting Workflow create/get/list
#   4. A RoleBinding linking the Sensor SA to the Role across namespaces
---
# Workflow executor SA — referenced by the argo-workflows Helm chart
# RoleBinding "argo-workflows-workflow" which grants permission to
# create workflowtaskresults. The Helm chart creates the RoleBinding
# but not the SA itself.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-workflow
  namespace: argo-workflows
---
# Sensor SA — used by the Sensor pod in argo-events to submit
# Workflow resources cross-namespace into argo-workflows.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sensor-workflow-submit
  namespace: argo-events
---
# Role lives in the TARGET namespace (argo-workflows) where
# the Sensor needs to create Workflow resources.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sensor-workflow-submit
  namespace: argo-workflows
rules:
  - apiGroups:
      - argoproj.io
    resources:
      - workflows
      - workflowtemplates
    verbs:
      - create
      - get
      - list
      - watch
---
# RoleBinding in the TARGET namespace, referencing the SA from argo-events.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sensor-workflow-submit
  namespace: argo-workflows
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sensor-workflow-submit
subjects:
  - kind: ServiceAccount
    name: sensor-workflow-submit
    namespace: argo-events
