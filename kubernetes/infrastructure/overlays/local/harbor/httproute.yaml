# HTTPRoute for Harbor — Local Development
# Routes traffic to the Harbor core service via the Traefik Gateway.
# Docker push/pull: docker login harbor.k8s.local
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: harbor
  namespace: harbor
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
  hostnames:
    - harbor.k8s.local
  rules:
    # Harbor nginx frontend (routes to core, portal, registry internally)
    - backendRefs:
        - name: harbor
          port: 80
