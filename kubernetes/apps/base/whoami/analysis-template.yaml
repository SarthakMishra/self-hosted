# AnalysisTemplate for automated canary promotion
# Used by Argo Rollouts to decide whether to promote or rollback.
# This simple template checks that the whoami service returns HTTP 200.
# Replace with Prometheus queries for real-world apps.
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: whoami-health-check
  namespace: whoami
spec:
  metrics:
    - name: http-success
      interval: 10s
      count: 3
      successCondition: result == "200"
      failureLimit: 1
      provider:
        web:
          url: http://whoami.whoami.svc.cluster.local
          method: GET
          expectedStatusCodes:
            - 200
