# MinIO Helm chart — shared defaults
# Chart: https://charts.min.io (minio)
#
# Install with base + overlay values:
#   helm install minio minio/minio -n minio \
#     -f infrastructure/base/minio/helm-values.yaml \
#     -f infrastructure/overlays/{env}/minio/helm-values.yaml
#
# MinIO provides S3-compatible artifact storage for Argo Workflows.

# Single-node mode (homelab)
mode: standalone

# Default buckets to create on startup
buckets:
  - name: argo-artifacts
    policy: none

# Console (web UI)
consoleService:
  type: ClusterIP

# API service
service:
  type: ClusterIP

# Credentials (override in overlay .env / secrets)
rootUser: changeme
rootPassword: changeme
