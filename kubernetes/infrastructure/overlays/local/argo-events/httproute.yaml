# HTTPRoute for Argo Events webhook — Local Development
# Receives webhook events (e.g. GitHub push) and routes them
# to the EventSource service via the Traefik Gateway.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argo-events-webhook
  namespace: argo-events
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
  hostnames:
    - webhooks.k8s.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /github
      backendRefs:
        - name: github-eventsource-svc
          port: 12000
