# Argo CD Application for whoami — Local Development
# Syncs the whoami app from the local Kustomize overlay in this Git repo.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: whoami
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/SarthakMishra/self-hosted.git
    targetRevision: main
    path: kubernetes/apps/overlays/local/whoami

  destination:
    server: https://kubernetes.default.svc
    namespace: whoami

  # Kubernetes auto-adds the metadata.name label to namespaces.
  # ServerSideApply handles all other server-defaulted fields, but
  # this label diff persists because the namespace was created before
  # Argo CD took ownership via SSA.
  ignoreDifferences:
    - group: ""
      kind: Namespace
      jsonPointers:
        - /metadata/labels/kubernetes.io~1metadata.name

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
