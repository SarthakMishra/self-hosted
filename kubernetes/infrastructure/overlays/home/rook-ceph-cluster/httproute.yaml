# Ceph Dashboard (web UI) — replaces MinIO console
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ceph-dashboard
  namespace: rook-ceph
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
  hostnames:
    - ceph.k8s.home.example.com
  rules:
    - backendRefs:
        - name: rook-ceph-mgr-dashboard
          port: 7000
