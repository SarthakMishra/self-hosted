# HTTPRoute for whoami — Local Development
# Uses the Gateway API (successor to Ingress/IngressRoute).
# References the Traefik Gateway deployed by the Helm chart.
# Both stable and canary backendRefs are required for Argo Rollouts
# Gateway API plugin to manage traffic weights during canary deployments.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: whoami
  namespace: whoami
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: traefik-gateway
      namespace: traefik
  hostnames:
    - whoami.k8s.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: whoami-stable
          port: 80
          weight: 1
        - group: ""
          kind: Service
          name: whoami-canary
          port: 80
          weight: 1
