apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/whoami
  - httproute.yaml

# Image override — points whoami at the local Harbor registry.
# The tag is updated automatically by the CI/CD pipeline's
# update-manifests step (kustomize edit set image).
images:
  - name: traefik/whoami
    newName: harbor.k8s.local/library/whoami
    newTag: abc1234
