# Argo Workflow Template: Build and Push to Harbor — Local Development
# Clones a Git repo, builds a container image with BuildKit, and pushes
# to Harbor over HTTP (insecure, no TLS for local dev).
#
# After a successful build, the update-manifests step clones the GitOps
# repo (self-hosted), runs `kustomize edit set image` to update the
# image tag in the appropriate overlay, and pushes the change back to
# Git. Argo CD then detects the commit and syncs the new image.
#
# BuildKit replaces Kaniko as the container image builder. It runs in rootless
# daemonless mode (moby/buildkit:rootless) — no privileged containers needed.
# BuildKit is actively maintained, supports better caching, multi-platform
# builds, and full Dockerfile feature parity with `docker build`.
#
# Differences from home/production:
#   - BuildKit is configured with registry.insecure=true for HTTP-only Harbor
#   - Uses a custom buildkitd.toml mounted via ConfigMap to allow insecure push
#   - Uses volumeClaimTemplates so the cloned source persists across
#     step pods (emptyDir is per-pod and does NOT share between steps)
#
# Usage — submit manually:
#   argo submit -n argo-workflows --from workflowtemplate/build-and-push \
#     -p repo=https://github.com/user/app \
#     -p branch=main \
#     -p image=harbor.k8s.local/library/app \
#     -p tag=latest
#
# Prerequisites:
#   kubectl -n argo-workflows create secret docker-registry harbor-registry-credentials \
#     --docker-server=harbor.k8s.local \
#     --docker-username=admin \
#     --docker-password=changeme
#
#   kubectl -n argo-workflows create configmap buildkitd-config \
#     --from-file=buildkitd.toml  (see setup-cicd.sh for automatic creation)
#
#   kubectl -n argo-workflows create secret generic git-deploy-key \
#     --from-file=ssh-privatekey=/path/to/deploy_key
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: build-and-push
  namespace: argo-workflows
spec:
  serviceAccountName: argo-workflow
  entrypoint: build-pipeline
  arguments:
    parameters:
      - name: repo
        value: ""
      - name: branch
        value: main
      - name: image
        value: ""
      - name: tag
        value: latest
      - name: dockerfile
        value: Dockerfile
      - name: context
        value: .
      # GitOps repo where Kustomize overlays live.
      # The update-manifests step clones this repo, updates the image
      # tag, and pushes the commit back so Argo CD can sync it.
      - name: deploy-repo
        value: git@github.com:SarthakMishra/self-hosted.git
      - name: deploy-branch
        value: kubernetes
      # Kustomize overlay path (relative to the deploy-repo root) where
      # `kustomize edit set image` will be run. The Sensor maps the app
      # repo name to the correct overlay directory.
      - name: overlay
        value: kubernetes/apps/overlays/local/whoami

  # Docker config secret for BuildKit to authenticate with Harbor.
  # Mounted as a workflow-level volume so any template can use it.
  volumes:
    - name: docker-config
      secret:
        secretName: harbor-registry-credentials
        items:
          - key: .dockerconfigjson
            path: config.json
    # BuildKit daemon configuration — allows insecure (HTTP) registries
    # for local development. Created by setup-cicd.sh.
    - name: buildkitd-config
      configMap:
        name: buildkitd-config
    # SSH deploy key for pushing manifest updates back to the GitOps repo.
    # Must have write access to the deploy-repo. Created by setup-cicd.sh.
    - name: git-deploy-key
      secret:
        secretName: git-deploy-key
        defaultMode: 256

  # PVC shared across all step pods within a single workflow run.
  # The cloned source persists from the git-clone step to the
  # buildkit-build step even though they run in separate pods.
  volumeClaimTemplates:
    - metadata:
        name: workspace
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi

  templates:
    - name: build-pipeline
      steps:
        - - name: clone
            template: git-clone
        - - name: build-and-push
            template: buildkit-build
        - - name: update-manifests
            template: update-manifests

    - name: git-clone
      container:
        image: alpine/git:latest
        command: [sh, -c]
        args:
          - |
            # Strip refs/heads/ prefix if present (webhook payloads send full ref)
            BRANCH="{{workflow.parameters.branch}}"
            BRANCH="${BRANCH#refs/heads/}"
            echo "Cloning branch: ${BRANCH}"
            git clone --branch "${BRANCH}" \
              --single-branch --depth 1 \
              {{workflow.parameters.repo}} /workspace/source
        volumeMounts:
          - name: workspace
            mountPath: /workspace

    - name: buildkit-build
      container:
        image: moby/buildkit:rootless
        volumeMounts:
          - name: workspace
            mountPath: /workspace
          - name: docker-config
            mountPath: /.docker
          - name: buildkitd-config
            mountPath: /home/user/.config/buildkit
        workingDir: /workspace/source/{{workflow.parameters.context}}
        env:
          - name: BUILDKITD_FLAGS
            value: --oci-worker-no-process-sandbox
          - name: DOCKER_CONFIG
            value: /.docker
        command:
          - sh
          - -c
          - |
            # Build the full image name.
            # When triggered by the Sensor, "image" is just the repo name
            # (e.g. "whoami"). When submitted manually, it may already be
            # a full path (e.g. "harbor.k8s.local/library/whoami").
            IMAGE="{{workflow.parameters.image}}"
            case "${IMAGE}" in
              */*) ;; # already contains a slash — assume full path
              *)  IMAGE="harbor.k8s.local/library/${IMAGE}" ;;
            esac

            # Truncate tag to 7 chars (short SHA) if it looks like a
            # full commit hash (40 hex chars). Manual tags like "test"
            # or "latest" pass through unchanged.
            TAG="{{workflow.parameters.tag}}"
            if echo "${TAG}" | grep -qE '^[0-9a-f]{8,40}$'; then
              TAG="$(echo "${TAG}" | head -c 7)"
            fi

            echo "Image: ${IMAGE}:${TAG}"

            buildctl-daemonless.sh build \
              --frontend dockerfile.v0 \
              --local context=. \
              --local dockerfile=. \
              --opt "filename={{workflow.parameters.dockerfile}}" \
              --output "type=image,name=${IMAGE}:${TAG},push=true" \
              --export-cache type=inline \
              --import-cache "type=registry,ref=${IMAGE}:buildcache"
        readinessProbe:
          exec:
            command: [sh, -c, "buildctl debug workers"]

    # ---------------------------------------------------------------
    # Update Kustomize overlay with the newly built image tag, then
    # push the commit back to the GitOps repo so Argo CD syncs it.
    # ---------------------------------------------------------------
    - name: update-manifests
      container:
        image: alpine/git:latest
        volumeMounts:
          - name: workspace
            mountPath: /workspace
          - name: git-deploy-key
            mountPath: /root/.ssh/deploy-key
            subPath: ssh-privatekey
            readOnly: true
        command:
          - sh
          - -c
          - |
            set -euo pipefail

            # ----------------------------------------------------------
            # 1. Resolve IMAGE and TAG (same logic as buildkit-build)
            # ----------------------------------------------------------
            IMAGE="{{workflow.parameters.image}}"
            case "${IMAGE}" in
              */*) ;;
              *)  IMAGE="harbor.k8s.local/library/${IMAGE}" ;;
            esac

            TAG="{{workflow.parameters.tag}}"
            if echo "${TAG}" | grep -qE '^[0-9a-f]{8,40}$'; then
              TAG="$(echo "${TAG}" | head -c 7)"
            fi

            echo "Updating manifests to ${IMAGE}:${TAG}"

            # ----------------------------------------------------------
            # 2. Install kustomize (standalone binary)
            # ----------------------------------------------------------
            # Download directly — the official install script requires
            # bash but alpine/git only has ash (BusyBox).
            echo "Installing kustomize..."
            KUSTOMIZE_VERSION=5.4.3
            wget -qO /tmp/kustomize.tar.gz \
              "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv${KUSTOMIZE_VERSION}/kustomize_v${KUSTOMIZE_VERSION}_linux_amd64.tar.gz"
            tar -xzf /tmp/kustomize.tar.gz -C /usr/local/bin
            chmod +x /usr/local/bin/kustomize
            rm /tmp/kustomize.tar.gz

            # ----------------------------------------------------------
            # 3. Configure SSH for Git push
            # ----------------------------------------------------------
            mkdir -p /root/.ssh
            cp /root/.ssh/deploy-key /root/.ssh/id_ed25519
            chmod 600 /root/.ssh/id_ed25519

            # Accept any host key (CI environment — the deploy key
            # itself is the trust anchor, not the host fingerprint).
            cat > /root/.ssh/config <<'SSH_EOF'
            Host *
              StrictHostKeyChecking no
              UserKnownHostsFile /dev/null
              IdentityFile /root/.ssh/id_ed25519
              LogLevel ERROR
            SSH_EOF
            chmod 600 /root/.ssh/config

            # ----------------------------------------------------------
            # 4. Clone the GitOps repo
            # ----------------------------------------------------------
            DEPLOY_BRANCH="{{workflow.parameters.deploy-branch}}"
            git clone --branch "${DEPLOY_BRANCH}" --single-branch --depth 1 \
              "{{workflow.parameters.deploy-repo}}" /workspace/deploy

            # Resolve overlay path: if the value contains a slash, treat
            # it as a full relative path (e.g. kubernetes/apps/overlays/local/whoami).
            # Otherwise it's a bare app name from the Sensor (e.g. "whoami")
            # and we expand it to the conventional overlay directory.
            OVERLAY="{{workflow.parameters.overlay}}"
            case "${OVERLAY}" in
              */*) ;; # already a path
              *)  OVERLAY="kubernetes/apps/overlays/local/${OVERLAY}" ;;
            esac

            cd /workspace/deploy/${OVERLAY}

            # ----------------------------------------------------------
            # 5. Determine the base image name to replace
            # ----------------------------------------------------------
            # Read the existing images entry from kustomization.yaml.
            # The newName might already be set (e.g. harbor.k8s.local/library/whoami).
            # We need the *original* image name (e.g. traefik/whoami) that
            # kustomize uses as the match key.
            #
            # kustomize edit set image expects: OLD_NAME=NEW_NAME:NEW_TAG
            # If there's already an images entry, read the original name.
            # Otherwise, fall back to using the image param directly.
            #
            # The YAML structure is:
            #   images:
            #   - name: traefik/whoami     <-- this is what we need
            #     newName: harbor.k8s.local/library/whoami
            #     newTag: latest
            ORIGINAL_IMAGE=""
            if [ -f kustomization.yaml ]; then
              # Extract the first "- name:" entry under the images section.
              # grep -A5 gives enough lines to find it even with blank
              # lines or comments between "images:" and the first entry.
              ORIGINAL_IMAGE=$(grep -A5 '^images:' kustomization.yaml \
                | grep '^\- name:\|^  - name:\|^    - name:' | head -1 \
                | sed 's/.*- name: *//' | tr -d '"' || true)
            fi

            if [ -z "${ORIGINAL_IMAGE}" ]; then
              echo "WARNING: Could not detect original image name from kustomization.yaml"
              echo "Falling back to ${IMAGE} as both source and target"
              ORIGINAL_IMAGE="${IMAGE}"
            fi

            echo "Base image: ${ORIGINAL_IMAGE}"
            echo "New image:  ${IMAGE}:${TAG}"

            # ----------------------------------------------------------
            # 6. Run kustomize edit set image
            # ----------------------------------------------------------
            kustomize edit set image "${ORIGINAL_IMAGE}=${IMAGE}:${TAG}"

            echo ""
            echo "Updated kustomization.yaml:"
            cat kustomization.yaml
            echo ""

            # ----------------------------------------------------------
            # 7. Commit and push (skip if no changes)
            # ----------------------------------------------------------
            git config user.email "argo-workflows@k8s.local"
            git config user.name "Argo Workflows"

            git add kustomization.yaml

            if git diff --cached --quiet; then
              echo "No changes to commit — image tag already up to date."
              exit 0
            fi

            # [skip ci] prevents the CI pipeline from triggering on its
            # own manifest-update commits (avoids infinite loop).
            git commit -m "chore(apps): update ${OVERLAY} to ${IMAGE}:${TAG} [skip ci]

            Automated by Argo Workflows build pipeline.
            Source commit: {{workflow.parameters.tag}}
            Workflow: {{workflow.name}}"

            git push origin "${DEPLOY_BRANCH}"

            echo ""
            echo "Manifests updated and pushed. Argo CD will sync shortly."
