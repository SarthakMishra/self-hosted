# HTTPRoute for whoami — Local Development
# Uses the Gateway API (successor to Ingress/IngressRoute).
# References the Traefik Gateway deployed by the Helm chart.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: whoami
  namespace: whoami
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
  hostnames:
    - whoami.k8s.local
  rules:
    - backendRefs:
        - name: whoami
          port: 80
