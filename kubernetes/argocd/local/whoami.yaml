# Argo CD Application for whoami — Local Development
# Syncs the whoami app from the local Kustomize overlay in this Git repo.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: whoami
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/SarthakMishra/self-hosted.git
    targetRevision: kubernetes
    path: kubernetes/apps/overlays/local/whoami

  destination:
    server: https://kubernetes.default.svc
    namespace: whoami

  # Ignore fields that Kubernetes auto-populates on resources.
  # Without these, Argo CD sees perpetual OutOfSync diffs between
  # the minimal manifests in Git and the server-defaulted live state.
  ignoreDifferences:
    - group: ""
      kind: Namespace
      jsonPointers:
        - /metadata/labels/kubernetes.io~1metadata.name
        - /spec/finalizers
        - /status
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      jsonPointers:
        - /status
    - group: argoproj.io
      kind: Rollout
      jsonPointers:
        - /status
    - group: ""
      kind: Service
      jsonPointers:
        - /spec/clusterIP
        - /spec/clusterIPs
        - /spec/internalTrafficPolicy
        - /spec/ipFamilies
        - /spec/ipFamilyPolicy
        - /spec/sessionAffinity
        - /status

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
