# MinIO Console (web UI)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: minio-console
  namespace: minio
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
  hostnames:
    - minio.k8s.home.example.com
  rules:
    - backendRefs:
        - name: minio-console
          port: 9001
