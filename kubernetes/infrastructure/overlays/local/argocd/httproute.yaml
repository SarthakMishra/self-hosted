# HTTPRoute for Argo CD — Local Development
# Routes traffic to the Argo CD server via the Traefik Gateway.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
  hostnames:
    - argocd.k8s.local
  rules:
    - backendRefs:
        - name: argocd-server
          port: 80
