# AnalysisTemplate for automated canary promotion
# Used by Argo Rollouts to decide whether to promote or rollback.
# This simple template checks that the whoami service is reachable and
# returns a non-empty response. The web provider treats non-2xx responses
# as errors automatically.
# Replace with Prometheus queries for real-world apps.
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: whoami-health-check
  namespace: whoami
spec:
  metrics:
    - name: http-success
      interval: 10s
      count: 3
      successCondition: len(result) > 0
      failureLimit: 1
      provider:
        web:
          url: http://whoami-stable.whoami.svc.cluster.local
