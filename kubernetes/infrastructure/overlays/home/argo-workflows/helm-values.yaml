# Argo Workflows Helm chart — Home Server overrides
#
# Install with both base and overlay values:
#   helm install argo-workflows argo/argo-workflows -n argo-workflows \
#     -f infrastructure/base/argo-workflows/helm-values.yaml \
#     -f infrastructure/overlays/home/argo-workflows/helm-values.yaml

# Artifact repository: Ceph Object Store (RGW) via Rook
artifactRepository:
  s3:
    bucket: argo-artifacts
    endpoint: rook-ceph-rgw-ceph-objectstore.rook-ceph.svc.cluster.local:80
    insecure: true
    accessKeySecret:
      name: argo-artifacts
      key: AWS_ACCESS_KEY_ID
    secretKeySecret:
      name: argo-artifacts
      key: AWS_SECRET_ACCESS_KEY
