# Webhook endpoint for Argo Events
# GitHub/Gitea sends push events here to trigger CI pipelines.
# This must be reachable externally (via Cloudflare Tunnel or port forward).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argo-events-webhook
  namespace: argo-events
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
  hostnames:
    - webhooks.k8s.home.example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /github
      backendRefs:
        - name: github-eventsource-svc
          port: 12000
